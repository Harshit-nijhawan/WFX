name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 14 minutes — Render spins down after 15 minutes of inactivity
    - cron: '*/14 * * * *'
  workflow_dispatch: # Also allows manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping WFX Backend Health Endpoint
        run: |
          echo "Pinging backend at $(date)..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://wfx-backend.onrender.com/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Warning: Health check returned $STATUS"
          else
            echo "Backend is alive!"
          fi
